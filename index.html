<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Download Page</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f2f2f2;
        }

        .box {
            text-align: center;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Tải file</h2>
    <button onclick="downloadFile()">Download</button>
</div>

<script>
    function downloadFile() {
        // file nằm cùng repo với index.html
        const fileUrl = "./ssms.zip"; // đổi tên file ở đây

        const a = document.createElement("a");
        a.href = fileUrl;
        a.download = ".zip"; // tên khi tải về
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>

</body>
</html>
